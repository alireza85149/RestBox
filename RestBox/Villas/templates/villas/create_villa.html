<!DOCTYPE html>
<html>
<head>
    <title>Add New Villa</title>
</head>
<body>
    <h1>Add New Villa</h1>
    
    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        
        <div>
            <label for="city">City:</label><br>
            <input type="text" id="city" name="city" required placeholder="Enter city name" value="{{ city|default:'' }}">
        </div>
        
        <br>
        
        <div>
            <label for="title">Villa Title:</label><br>
            <input type="text" id="title" name="title" required placeholder="Enter villa title" value="{{ title|default:'' }}">
        </div>
        
        <br>
        
        <div>
            <label for="address">Address:</label><br>
            <textarea id="address" name="address" required placeholder="Enter full address">{{ address|default:'' }}</textarea>
        </div>
        
        <br>
        
        <div>
            <label for="capacity">Capacity (guests):</label><br>
            <input type="number" id="capacity" name="capacity" required min="1" placeholder="Number of guests" value="{{ capacity|default:'' }}">
        </div>
        
        <br>
        
        <div>
            <label for="price_per_night">Price per Night (Tomans):</label><br>
            <input type="number" id="price_per_night" name="price_per_night" required min="0" step="0.01" placeholder="Price in Tomans" value="{{ price_per_night|default:'' }}">
        </div>
        
        <br>
        <div>
            <label><strong>Amenities:</strong></label><br>
            <br>
            <label>
                <input type="checkbox" name="amenities_wifi" value="true">
                WiFi
            </label>
            <br>
            <label>
                <input type="checkbox" name="amenities_parking" value="true">
                Parking
            </label>
            <br>
            <label>
                <input type="checkbox" name="amenities_pool" value="true">
                Pool
            </label>
            <br>
            <br>
            <p><small>Check all amenities that this villa offers</small></p>
        </div>
        
        <br>
        
        <button type="submit">Add Villa</button>
    </form>
    
    <br>
    <a href="{% url 'Villas:host_dashboard' %}">Back to Dashboard</a>
</body>
</html>
